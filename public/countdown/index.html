<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown | Rishi Subjects</title>
    <meta
      name="description"
      content="Create polished countdowns with scenery backdrops, progress tracking, and ambient audio."
    />
    <meta name="robots" content="noindex,nofollow" data-testid="robots-meta" />
    <link rel="stylesheet" href="/countdown/countdown.css?v=20260304f" />
  </head>
  <body class="countdown-page">
    <div class="countdown-background" data-testid="bg-image" aria-hidden="true"></div>
    <div class="countdown-overlay" data-testid="overlay" aria-hidden="true"></div>

    <main class="countdown-main" data-testid="countdown-main">
      <section class="countdown-shell">
        <h1>Countdown</h1>
        <p class="countdown-title" data-testid="countdown-title">Your countdown title appears here</p>
        <p class="countdown-status" data-testid="countdown-status">Set a future UK date and time to begin.</p>

        <section class="countdown-display" data-testid="countdown-display" role="timer" aria-live="polite">
          <article class="countdown-unit" data-unit="days">
            <span class="unit-label" data-testid="label-days">Days</span>
            <span class="unit-value" data-testid="countdown-days">00</span>
          </article>
          <article class="countdown-unit" data-unit="hours">
            <span class="unit-label" data-testid="label-hours">Hours</span>
            <span class="unit-value" data-testid="countdown-hours">00</span>
          </article>
          <article class="countdown-unit" data-unit="minutes">
            <span class="unit-label" data-testid="label-minutes">Minutes</span>
            <span class="unit-value" data-testid="countdown-minutes">00</span>
          </article>
          <article class="countdown-unit" data-unit="seconds">
            <span class="unit-label" data-testid="label-seconds">Seconds</span>
            <span class="unit-value" data-testid="countdown-seconds">00</span>
          </article>
        </section>

        <section class="progress-wrap" aria-label="Countdown progress">
          <div class="progress-head">
            <span>Time left</span>
            <span data-testid="progress-percent">100%</span>
          </div>
          <div class="progress-track">
            <div
              class="progress-fill"
              data-testid="progress-bar"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="100"
            ></div>
          </div>
        </section>

        <p class="resolved-date" data-testid="resolved-date-display" aria-live="polite"></p>

        <form class="timer-form" data-testid="timer-form" autocomplete="off">
          <label for="titleInput">What is this for?</label>
          <input id="titleInput" name="titleInput" data-testid="title-input" type="text" maxlength="120" placeholder="e.g. Final exam countdown" />

          <div class="resolve-row">
            <label for="resolveQuery">Describe event (optional)</label>
            <div class="resolve-controls">
              <input
                id="resolveQuery"
                name="resolveQuery"
                data-testid="resolve-query"
                type="text"
                placeholder="e.g. SQA Higher maths exam day"
              />
              <button type="button" data-testid="resolve-button">Find date</button>
            </div>
            <p class="resolve-notes" data-testid="resolve-notes" aria-live="polite"></p>
            <div class="resolve-suggestions" data-testid="resolve-suggestions"></div>
          </div>

          <div class="date-time-grid">
            <div>
              <label for="deadlineDate">Target date (DD/MM/YYYY)</label>
              <input id="deadlineDate" name="deadlineDate" data-testid="deadline-date" type="text" inputmode="numeric" placeholder="DD/MM/YYYY" />
            </div>
            <div>
              <label for="deadlineTime">Target time (24h HH:MM)</label>
              <input id="deadlineTime" name="deadlineTime" data-testid="deadline-time" type="time" step="60" />
            </div>
          </div>
          <input type="hidden" data-testid="deadline-input" />

          <fieldset class="units-fieldset">
            <legend>Units to show</legend>
            <label class="inline-control" for="unitsDays">
              <input id="unitsDays" data-testid="units-days" type="checkbox" checked />
              Days
            </label>
            <label class="inline-control" for="unitsHours">
              <input id="unitsHours" data-testid="units-hours" type="checkbox" checked />
              Hours
            </label>
            <label class="inline-control" for="unitsMinutes">
              <input id="unitsMinutes" data-testid="units-minutes" type="checkbox" checked />
              Minutes
            </label>
            <label class="inline-control" for="unitsSeconds">
              <input id="unitsSeconds" data-testid="units-seconds" type="checkbox" checked />
              Seconds
            </label>
          </fieldset>

          <fieldset class="visibility-fieldset">
            <legend>Timer visibility</legend>
            <label class="inline-control" for="publicCheckbox">
              <input id="publicCheckbox" name="publicCheckbox" data-testid="public-checkbox" type="checkbox" />
              Public timer
            </label>
            <label class="inline-control" for="privateCheckbox">
              <input id="privateCheckbox" name="privateCheckbox" data-testid="private-checkbox" type="checkbox" checked />
              Private timer
            </label>
          </fieldset>

          <label for="setupPassword">Private password</label>
          <input
            id="setupPassword"
            name="setupPassword"
            data-testid="setup-password-input"
            type="password"
            minlength="12"
            autocomplete="new-password"
            placeholder="Minimum 12 chars with upper/lowercase + number"
          />

          <button type="submit" data-testid="create-button">Create countdown</button>
        </form>

        <section class="share-grid">
          <label for="publicUrl">Public URL</label>
          <input id="publicUrl" data-testid="public-url" type="text" readonly />

          <label for="privateUrl">Private URL</label>
          <input id="privateUrl" data-testid="private-url" type="text" readonly />

          <label for="embedUrl">Embed URL</label>
          <input id="embedUrl" data-testid="embed-url" type="text" readonly />
        </section>

        <div class="actions-row">
          <button type="button" data-testid="make-public-button" disabled>Make public</button>
        </div>

        <section class="password-gate" data-testid="password-gate" hidden>
          <h2>Private countdown</h2>
          <p>Enter the password to view this timer.</p>
          <input
            data-testid="password-input"
            id="passwordInput"
            type="password"
            autocomplete="current-password"
            placeholder="Enter countdown password"
          />
          <button type="button" data-testid="password-submit">Unlock</button>
          <p class="password-message" data-testid="password-message" aria-live="polite"></p>
        </section>

        <section class="audio-row">
          <audio
            id="ambientAudio"
            data-testid="audio-element"
            preload="none"
            src="https://ice-the.musicradio.com/ClassicFMMP3"
          ></audio>
          <div class="audio-buttons">
            <button type="button" data-testid="music-play">Play ambient</button>
            <button type="button" data-testid="music-pause">Pause ambient</button>
          </div>
          <p class="audio-status" data-testid="audio-status" aria-live="polite">Ambient paused.</p>
          <p class="music-error" data-testid="music-error" hidden></p>
        </section>

        <button type="button" class="test-control" data-testid="bg-next" hidden>Next background</button>

        <p class="error-message" data-testid="timer-error" hidden></p>

        <p class="credits" data-testid="credits">
          Photos via
          <a href="https://unsplash.com/license" target="_blank" rel="noreferrer noopener">Unsplash</a>
          · details in
          <a href="/countdown/CREDITS.md" target="_blank" rel="noreferrer noopener">CREDITS</a>
        </p>
      </section>
    </main>

    <script src="/runtime-config.js?v=20260214"></script>
    <script src="/countdown/countdown.js?v=20260304f" type="module"></script>
  </body>
</html>
