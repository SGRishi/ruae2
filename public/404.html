<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 | Rishi Subjects</title>
    <script>
      (function redirectLegacyCountdownTimerRoute() {
        const parts = String(window.location.pathname || '')
          .split('/')
          .filter(Boolean);
        if (parts.length !== 2 || parts[0] !== 'countdown') return;

        const timerId = String(parts[1] || '').trim();
        if (!/^[A-Za-z0-9_-]{6,120}$/.test(timerId)) return;

        const nextUrl = new URL(window.location.href);
        nextUrl.pathname = '/countdown/';
        nextUrl.searchParams.set('id', timerId);
        window.location.replace(nextUrl.toString());
      })();

      (function redirectPagesDevHost() {
        const host = String(window.location.hostname || '').toLowerCase();
        if (!host.endsWith('.pages.dev')) return;

        const nextUrl = new URL(window.location.href);
        nextUrl.protocol = 'https:';
        nextUrl.host = 'rishisubjects.co.uk';
        window.location.replace(nextUrl.toString());
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f9fc;
        color: #0f172a;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 16px;
      }
      a {
        color: #0f172a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>That page does not exist.</p>
      <a href="/">Go to countdown</a>
    </main>
  </body>
</html>
